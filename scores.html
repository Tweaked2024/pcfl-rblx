<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AFL - Scoreboards</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { background-color: #fcfcfc; color: #111827; }
        
        header { background: #ffffff; border-bottom: 1px solid #efefef; position: sticky; top: 0; z-index: 1000; }
        .nav-container { max-width: 1200px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; padding: 0.8rem 2rem; }
        .logo-area { font-weight: 900; font-size: 1.25rem; letter-spacing: -0.05em; text-transform: uppercase; color: #111827; text-decoration: none; }
        .main-nav { display: flex; gap: 1.75rem; }
        .nav-item { text-decoration: none; color: #4b5563; font-size: 0.85rem; font-weight: 700; text-transform: lowercase; }
        .nav-item.active { color: #e61e2b; }

        main { max-width: 1200px; margin: 2rem auto; padding: 0 2rem; }
        
        /* Compact Segment Timeline Switcher Row */
        .timeline-switcher-row { display: flex; gap: 0.4rem; margin-bottom: 2rem; flex-wrap: wrap; }
        .segment-btn { background: #f3f4f6; border: none; color: #4b5563; font-size: 0.75rem; font-weight: 700; padding: 0.55rem 1rem; border-radius: 4px; cursor: pointer; text-transform: uppercase; }
        .segment-btn.selected { background: #e61e2b; color: #ffffff; }

        /* Multi Column Split Layout Grid */
        .timeline-columns-split { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
        .column-board { background: #ffffff; border: 1px solid #e5e7eb; border-radius: 8px; padding: 1.25rem; }
        .column-board-header { display: flex; align-items: center; gap: 0.6rem; margin-bottom: 1.25rem; padding-bottom: 0.6rem; border-bottom: 2px solid #f3f4f6; }
        .column-board-header h3 { font-size: 1.15rem; font-weight: 900; text-transform: uppercase; letter-spacing: -0.02em; }
        .badge-final-tag { background: #fee2e2; color: #ef4444; font-size: 0.65rem; font-weight: 800; padding: 0.2rem 0.5rem; border-radius: 4px; text-transform: uppercase; letter-spacing: 0.02em; }

        /* Specific Horizontal Log Bars Row Format */
        .scoreboard-card-strip { display: flex; justify-content: space-between; align-items: center; padding: 0.7rem; border: 1px solid #f3f4f6; border-radius: 6px; margin-bottom: 0.5rem; font-size: 0.85rem; background: #ffffff; }
        .strip-team-block { display: flex; align-items: center; gap: 0.5rem; width: 42%; font-weight: 700; letter-spacing: -0.01em; }
        .strip-team-block.host-side { justify-content: flex-end; text-align: right; }
        .strip-helmet-indicator { width: 18px; height: 18px; border-radius: 3px; background: #cbd5e1; display: inline-block; }
        .strip-numerical-scores { width: 16%; text-align: center; font-weight: 900; font-size: 0.95rem; color: #111827; background: #f9fafb; padding: 0.2rem 0; border-radius: 4px; }
    </style>
</head>
<body>

    <header>
        <div class="nav-container">
            <a href="index.html" class="logo-area">AFL ECOSYSTEM</a>
            <nav class="main-nav">
                <a href="index.html" class="nav-item">standings</a>
                <a href="teams.html" class="nav-item">teams</a>
                <a href="scores.html" class="nav-item active">scores</a>
                <a href="stats.html" class="nav-item">stats</a>
                <a href="rulebook.html" class="nav-item">rulebook</a>
                <a href="legacy.html" class="nav-item">legacy</a>
            </nav>
        </div>
    </header>

    <main>
        <div class="timeline-switcher-row">
            <button class="segment-btn selected">Series I</button>
            <button class="segment-btn">Series II</button>
            <button class="segment-btn">Series III</button>
            <button class="segment-btn">Series IV</button>
            <button class="segment-btn">Series V</button>
            <button class="segment-btn">Series VI</button>
        </div>

        <div class="timeline-columns-split">
            <div class="column-board">
                <div class="column-board-header">
                    <h3>Week 1</h3> <span class="badge-final-tag">FINAL</span>
                </div>
                <div class="scoreboard-card-strip">
                    <div class="strip-team-block"><span class="strip-helmet-indicator" style="background:#ff5a00;"></span> STEELERS</div>
                    <div class="strip-numerical-scores">29 - 35</div>
                    <div class="strip-team-block host-side">BROWNS <span class="strip-helmet-indicator" style="background:#3e2723;"></span></div>
                </div>
                <div class="scoreboard-card-strip">
                    <div class="strip-team-block"><span class="strip-helmet-indicator" style="background:#008e97;"></span> DOLPHINS</div>
                    <div class="strip-numerical-scores">21 - 0</div>
                    <div class="strip-team-block host-side">TITANS <span class="strip-helmet-indicator" style="background:#4682b4;"></span></div>
                </div>
            </div>

            <div class="column-board">
                <div class="column-board-header">
                    <h3>Week 2</h3> <span class="badge-final-tag">FINAL</span>
                </div>
                <div class="scoreboard-card-strip">
                    <div class="strip-team-block"><span class="strip-helmet-indicator" style="background:#3e2723;"></span> BROWNS</div>
                    <div class="strip-numerical-scores">42 - 38</div>
                    <div class="strip-team-block host-side">COMMANDERS <span class="strip-helmet-indicator" style="background:#7c141c;"></span></div>
                </div>
            </div>
        </div>
    </main>

</body>
</html>
