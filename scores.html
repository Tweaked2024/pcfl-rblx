<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AFL - Score Center</title>
    <style>
        :root { --primary-red: #e61e2b; --border-color: #e2e8f0; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background: #f8fafc; }
        header { background: white; border-bottom: 1px solid var(--border-color); padding: 1rem 2rem; display: flex; justify-content: space-between; }
        .main-nav a { text-decoration: none; color: #64748b; margin-left: 1.5rem; font-weight: 600; }
        .main-nav a.active { color: var(--primary-red); }
        
        main { max-width: 1400px; margin: 2rem auto; padding: 0 2rem; }
        .btn-group { display: flex; gap: 0.5rem; margin-bottom: 2rem; }
        .series-btn { background: #e2e8f0; border: none; padding: 0.6rem 1.2rem; font-weight: bold; border-radius: 6px; cursor: pointer; }
        .series-btn.active { background: var(--primary-red); color: white; }

        .score-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 1.5rem; }
        .match-card { background: white; border: 1px solid var(--border-color); border-radius: 10px; padding: 1.5rem; }
        .match-header { font-weight: bold; color: var(--primary-red); border-bottom: 1px solid var(--border-color); padding-bottom: 0.5rem; margin-bottom: 0.75rem; }
        .score-line { display: flex; justify-content: space-between; margin: 0.4rem 0; font-weight: 600; }
    </style>
</head>
<body>

    <header>
        <strong style="text-transform:uppercase;">★ AFL</strong>
        <nav class="main-nav">
            <a href="index.html">Standings</a>
            <a href="teams.html">Teams</a>
            <a href="scores.html" class="active">Scores</a>
            <a href="stats.html">Stats</a>
            <a href="rulebook.html">Rulebook</a>
            <a href="legacy.html">Legacy</a>
        </nav>
    </header>

    <main>
        <div class="btn-group">
            <button class="series-btn active" onclick="loadSeries(1, this)">Series I</button>
            <button class="series-btn" onclick="loadSeries(2, this)">Series II</button>
            <button class="series-btn" onclick="loadSeries(3, this)">Series III</button>
            <button class="series-btn" onclick="loadSeries(4, this)">Series IV</button>
            <button class="series-btn" onclick="loadSeries(5, this)">Series V</button>
        </div>

        <h2 id="series-label" style="margin-bottom: 1.5rem; text-transform: uppercase;">Series I Schedule Logs</h2>
        <div class="score-container" id="scores-box"></div>
    </main>

    <script>
        const matchesData = {
            1: [{ wk: 'Week 1', h: 'CLE', hs: 35, a: 'PIT', as: 29 }, { wk: 'Week 1', h: 'MIA', hs: 21, a: 'TEN', as: 0 }],
            2: [{ wk: 'Week 2', h: 'BAL', hs: 24, a: 'KC', as: 20 }],
            3: [{ wk: 'Week 3', h: 'DAL', hs: 31, a: 'PHI', as: 28 }],
            4: [{ wk: 'Week 4', h: 'SF', hs: 42, a: 'SEA', as: 38 }],
            5: [{ wk: 'Week 5', h: 'NE', hs: 10, a: 'BUF', as: 31 }]
        };

        function loadSeries(num, btn) {
            document.querySelectorAll('.series-btn').forEach(b => b.classList.remove('active'));
            if(btn) btn.classList.add('active');
            
            document.getElementById('series-label').innerText = `Series ${num} Schedule Logs`;
            const container = document.getElementById('scores-box');
            container.innerHTML = '';

            const list = matchesData[num] || [];
            list.forEach(m => {
                const card = document.createElement('div');
                card.className = 'match-card';
                card.innerHTML = `
                    <div class="match-header">${m.wk} - FINAL</div>
                    <div class="score-line"><span>${m.h}</span><span>${m.hs}</span></div>
                    <div class="score-line"><span>${m.a}</span><span>${m.as}</span></div>
                `;
                container.appendChild(card);
            });
        }
        loadSeries(1);
    </script>
</body>
</html>
