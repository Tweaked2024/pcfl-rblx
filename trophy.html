<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NBL Player Trophy Room</title>
  <style>
    /* Clean foundational styling for the trophy room layout */
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background-color: #121212;
      color: #ffffff;
      margin: 0;
      padding: 2rem;
    }
    .container {
      max-width: 1000px;
      margin: 0 auto;
    }
    .at-back {
      display: inline-block;
      margin-bottom: 1.5rem;
      font-weight: bold;
      color: #e51c35; /* Matches your master primary red accent theme */
      text-decoration: none;
      transition: text-decoration 0.2s;
    }
    .at-back:hover {
      text-decoration: underline;
    }
    .trophy-header {
      background: linear-gradient(135deg, #1f1f1f, #2d2d2d);
      border: 1px solid #333;
      padding: 2rem;
      border-radius: 1rem;
      display: flex;
      align-items: center;
      gap: 1.5rem;
      margin-bottom: 2rem;
    }
    .player-avatar {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      background-color: #444;
      border: 3px solid #e51c35;
    }
    .player-name {
      font-size: 2rem;
      font-weight: 800;
      margin: 0 0 0.5rem 0;
    }
    .trophy-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 1.5rem;
    }
    .trophy-card {
      background-color: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 0.5rem;
      padding: 1rem;
      text-align: center;
      transition: transform 0.2s;
    }
    .trophy-card:hover {
      transform: translateY(-3px);
    }
    .trophy-icon {
      font-size: 2.5rem;
      margin-bottom: 0.5rem;
    }
    .trophy-title {
      font-size: 0.9rem;
      font-weight: bold;
    }
    .loading-msg {
      text-align: center;
      font-size: 1.2rem;
      color: #888;
      margin-block: 4rem;
    }
  </style>
</head>
<body>

  <div class="container">
    <!-- Link connecting back to your legacy page -->
    <a href="../legacy.html" class="at-back">← Back to Legacy Leaderboard</a>

    <div id="trophy-room-content">
      <div class="loading-msg">Loading trophy room details...</div>
    </div>
  </div>

  <script>
    // 1. Parse URL Parameters (?id=221991455&u=FINLEY4K)
    const urlParams = new URLSearchParams(window.location.search);
    const playerId = urlParams.get('id');
    const username = urlParams.get('u') || 'Unknown Player';

    const contentDiv = document.getElementById('trophy-room-content');

    if (!playerId) {
      contentDiv.innerHTML = `<div class="loading-msg" style="color: #e51c35;">No player ID provided in the URL.</div>`;
    } else {
      // 2. Dynamically build out the player layout using the URL data
      loadTrophyRoom(playerId, username);
    }

    function loadTrophyRoom(id, name) {
      // In a live environment, you would use 'id' to fetch data from your spreadsheet backend or API module
      // For now, this cleanly injects the target player data directly into your interface structures
      contentDiv.innerHTML = `
        <div class="trophy-header">
          <div class="player-avatar"></div>
          <div>
            <h1 class="player-name">${name}</h1>
            <div style="color: #888;">ID: ${id}</div>
          </div>
        </div>

        <h2 style="border-bottom: 2px solid #e51c35; padding-bottom: 0.5rem; margin-bottom: 1.5rem;">Trophy Collection</h2>
        
        <div class="trophy-grid">
          <div class="trophy-card">
            <div class="trophy-icon">🏆</div>
            <div class="trophy-title">All-Time Champion</div>
          </div>
          <div class="trophy-card">
            <div class="trophy-icon">⭐</div>
            <div class="trophy-title">League MVP</div>
          </div>
          <div class="trophy-card">
            <div class="trophy-icon">🏅</div>
            <div class="trophy-title">All-Pro Selection</div>
          </div>
        </div>
      `;
    }
  </script>
</body>
</html>
