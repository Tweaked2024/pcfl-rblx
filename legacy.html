<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leaderboard Layout Fix</title>
    <style>
        :root {
            --bg-color: #0d0f12;
            --card-bg: #14181f;
            --row-bg: #1a202c;
            --border-color: #2d3748;
            --gold-accent: #f6ad55;
            --text-main: #ffffff;
            --text-muted: #a0aec0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: system-ui, -apple-system, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            padding: 40px;
        }

        /* Fixed Split-Screen Container Layout */
        .workspace-grid {
            display: grid;
            grid-template-columns: 1fr 380px;
            gap: 30px;
            max-width: 1400px;
            margin: 0 auto;
            align-items: start;
        }

        /* Left Hand Main Leaderboard Stack */
        .leaderboard-list-side {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .player-row {
            background-color: var(--row-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 16px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            transition: transform 0.1s, border-color 0.15s;
        }

        .player-row:hover {
            border-color: var(--gold-accent);
            transform: translateX(2px);
        }

        .row-left {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .row-rank {
            font-weight: 800;
            font-size: 1.2rem;
            color: var(--gold-accent);
            width: 30px;
        }

        .row-name {
            font-weight: 700;
            font-size: 1.1rem;
        }

        .row-right {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .row-xp-value {
            font-weight: 800;
            font-size: 1.1rem;
            color: #fff;
        }

        /* Right Hand Stationary Breakdown Card (Exactly like images) */
        .breakdown-card-static {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        .card-header-title {
            font-size: 1.3rem;
            font-weight: 800;
            letter-spacing: 0.5px;
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 2px solid var(--border-color);
            text-transform: uppercase;
        }

        .stat-item-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            font-size: 0.95rem;
        }

        .stat-label-box {
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--text-muted);
        }

        .stat-value-box {
            font-weight: 700;
            color: #ffffff;
        }

        /* Highlighted Total Block at Bottom */
        .card-total-footer {
            margin-top: 24px;
            padding-top: 20px;
            border-top: 2px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .total-label-text {
            font-weight: 800;
            font-size: 0.85rem;
            text-transform: uppercase;
            color: var(--text-muted);
            letter-spacing: 1px;
        }

        .total-highlight-pill {
            background-color: #ecc94b;
            color: #1a202c;
            padding: 8px 18px;
            border-radius: 8px;
            font-weight: 900;
            font-size: 1.2rem;
            box-shadow: 0 4px 12px rgba(236, 201, 75, 0.2);
        }
    </style>
</head>
<body>

    <div class="workspace-grid">
        
        <div class="leaderboard-list-side">
            
            <div class="player-row" 
                 data-id="221991455" 
                 data-username="FINLEY4K" 
                 data-bowls="9,000" 
                 data-conf="2,400" 
                 data-mvp="2,750" 
                 data-opoty="500" 
                 data-allpro="1,400" 
                 data-star="1,800" 
                 data-crowns="2,400" 
                 data-badges="3,550" 
                 data-xp="23,800">
                <div class="row-left">
                    <div class="row-rank">1</div>
                    <div class="row-name">FINLEY4K</div>
                </div>
                <div class="row-right">
                    <div class="row-xp-value">23,800 XP</div>
                </div>
            </div>

            <div class="player-row" 
                 data-id="87654321" 
                 data-username="TheCoopDudeddd" 
                 data-bowls="1,000" 
                 data-conf="400" 
                 data-mvp="1,000" 
                 data-opoty="5,250" 
                 data-allpro="6,600" 
                 data-star="2,250" 
                 data-crowns="1,200" 
                 data-badges="2,150" 
                 data-xp="19,850">
                <div class="row-left">
                    <div class="row-rank">2</div>
                    <div class="row-name">TheCoopDudeddd</div>
                </div>
                <div class="row-right">
                    <div class="row-xp-value">19,850 XP</div>
                </div>
            </div>

        </div>

        <div class="breakdown-card-static">
            <div class="card-header-title" id="panelTargetUser">FINLEY4K</div>
            
            <div class="stat-item-row">
                <div class="stat-label-box">💍 Allegiance Bowls</div>
                <div class="stat-value-box" id="valBowls">9,000</div>
            </div>
            <div class="stat-item-row">
                <div class="stat-label-box">🏆 Conference Titles</div>
                <div class="stat-value-box" id="valConf">2,400</div>
            </div>
            <div class="stat-item-row">
                <div class="stat-label-box">👑 Top Honors / MVPs</div>
                <div class="stat-value-box" id="valMvp">2,750</div>
            </div>
            <div class="stat-item-row">
                <div class="stat-label-box">🔥 Yearly Awards</div>
                <div class="stat-value-box" id="valOpoty">500</div>
            </div>
            <div class="stat-item-row">
                <div class="stat-label-box">⭐ All-Pro Appearances</div>
                <div class="stat-value-box" id="valAllPro">1,400</div>
            </div>
            <div class="stat-item-row">
                <div class="stat-label-box">🌟 Star Bowl Honors</div>
                <div class="stat-value-box" id="valStar">1,800</div>
            </div>
            <div class="stat-item-row">
                <div class="stat-label-box">👑 Stat Category Crowns</div>
                <div class="stat-value-box" id="valCrowns">2,400</div>
            </div>
            <div class="stat-item-row">
                <div class="stat-label-box">🏅 Achievement Badges</div>
                <div class="stat-value-box" id="valBadges">3,550</div>
            </div>

            <div class="card-total-footer">
                <div class="total-label-text">Total Legacy XP</div>
                <div class="total-highlight-pill" id="valTotalXp">23,800</div>
            </div>
        </div>

    </div>

    <script src="legacy.js"></script>
</body>
</html>
