<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AFL - Hall of Fame Legacy</title>
    <style>
        :root { --gold: #d4af37; --bg-dark: #140f07; --border-gold: #45351f; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background: #1c1710; color: #f3eae0; }
        
        header { background: #261f14; padding: 1rem 2rem; display: flex; justify-content: space-between; border-bottom: 2px solid var(--gold); }
        header a { color: #bfa37a; text-decoration: none; margin-left: 1.5rem; font-weight: bold; }
        header a.active { color: var(--gold); }

        main { max-width: 1300px; margin: 2rem auto; padding: 0 2rem; }
        
        .panel { background: radial-gradient(circle, #2d1f10, #140f07); padding: 2rem; border-radius: 12px; border: 1px solid var(--border-gold); margin-bottom: 2rem; text-align: center; }
        .trophy-btn { background: #261f14; border: 1px solid var(--gold); color: var(--gold); padding: 0.5rem 1rem; border-radius: 6px; cursor: pointer; font-weight: bold; margin-top: 1rem; }
        .trophy-btn:hover { background: var(--gold); color: black; }

        .btn-group { display: flex; gap: 0.3rem; flex-wrap: wrap; margin-bottom: 1.5rem; }
        .tab-btn { background: #261f14; border: 1px solid var(--border-gold); color: #bfa37a; padding: 0.5rem 1rem; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .tab-btn.active { background: var(--gold); color: black; }

        .podium-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 1.5rem; margin-top: 1.5rem; }
        .award-card { background: white; color: #000; border-radius: 10px; padding: 1.5rem; text-align: center; border: 2px solid var(--gold); }

        /* Popups Modal Overlay */
        .modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; z-index: 200; }
        .modal.active { display: flex; }
        .modal-card { background: #1c1710; border: 2px solid var(--gold); padding: 2rem; border-radius: 12px; width: 90%; max-width: 380px; text-align: center; }
        .close-btn { background: none; border: none; color: white; font-size: 1.5rem; position: absolute; top: 10px; right: 15px; cursor: pointer; }
        .pill { background: #bfa37a; color: black; padding: 0.4rem 1rem; border-radius: 20px; display: inline-block; margin-top: 1rem; font-weight: bold; }
    </style>
</head>
<body>

    <header>
        <strong style="color:var(--gold);">👑 AFL LEGACY HOOF</strong>
        <nav>
            <a href="index.html">Standings</a>
            <a href="teams.html">Teams</a>
            <a href="scores.html">Scores</a>
            <a href="stats.html">Stats</a>
            <a href="rulebook.html">Rulebook</a>
            <a href="legacy.html" class="active">Legacy</a>
        </nav>
    </header>

    <main>
        <div class="panel">
            <h2>Career Milestones Logs</h2>
            <p>Click below to open the official award tier pop-up metrics window.</p>
            <button class="trophy-btn" onclick="openTrophy('Allegiance Bowl X Champion', 'Season 26 - FINLEY4K', '1,000 XP')">🏆 Inspect Trophy Matrix</button>
        </div>

        <h2 style="margin-bottom:1rem; color:var(--gold);">Award Tracker Engine Race</h2>
        <div class="btn-group">
            <button class="tab-btn active" onclick="switchRace('MVP', this)">MVP</button>
            <button class="tab-btn" onclick="switchRace('OPOTY', this)">OPOTY</button>
            <button class="tab-btn" onclick="switchRace('DPOTY', this)">DPOTY</button>
            <button class="tab-btn" onclick="switchRace('QBOTY', this)">QBOTY</button>
            <button class="tab-btn" onclick="switchRace('RBOTY', this)">RBOTY</button>
            <button class="tab-btn" onclick="switchRace('WROTY', this)">WROTY</button>
        </div>

        <div class="podium-row" id="raceBox"></div>
    </main>

    <div class="modal" id="trophyModal">
        <div class="modal-card" style="position: relative;">
            <button class="close-btn" onclick="closeTrophy()">×</button>
            <div style="font-size:3rem; margin-bottom:1rem;">🏆</div>
            <h3 id="m-title" style="color:var(--gold); text-transform:uppercase;">Trophy</h3>
            <p id="m-desc" style="margin: 0.5rem 0;"></p>
            <div class="pill" id="m-xp"></div>
        </div>
    </div>

    <script>
        const raceDb = {
            MVP: [
                { r: 1, name: 'niconeaccodyy', team: 'SEA', rtg: 93.0, desc: '2330 YDS | 25 TD' },
                { r: 2, name: 'DimingSLC', team: 'WAS', rtg: 88.4, desc: '7131 YDS | 68 TD' }
            ],
            OPOTY: [
                { r: 1, name: 'ChubbForce', team: 'CLE', rtg: 91.2, desc: '2150 YDS | 22 TD' }
            ]
        };

        function switchRace(key, btn) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            if(btn) btn.classList.add('active');

            const container = document.getElementById('raceBox');
            container.innerHTML = '';

            const list = raceDb[key] || [{ r: 1, name: 'Pending Updates', team: 'AFL', rtg: 0.0, desc: 'Data logs processing' }];
            list.forEach(p => {
                const div = document.createElement('div');
                div.className = 'award-card';
                div.innerHTML = `
                    <div style="background:#0f172a; color:white; padding:0.25rem; font-size:0.8rem; border-radius:4px;">Rank #${p.r}</div>
                    <h3 style="margin: 0.5rem 0;">${p.name}</h3>
                    <p style="color:#64748b; font-weight:bold;">${p.team}</p>
                    <div style="font-size:2rem; font-weight:900; color:#d97706; margin:0.5rem 0;">${p.rtg}</div>
                    <p style="font-size:0.85rem; background:#f1f5f9; padding:0.4rem; border-radius:4px;">${p.desc}</p>
                `;
                container.appendChild(div);
            });
        }

        function openTrophy(title, desc, xp) {
            document.getElementById('m-title').innerText = title;
            document.getElementById('m-desc').innerText = desc;
            document.getElementById('m-xp').innerText = "+" + xp + " Lifetime Allocation";
            document.getElementById('trophyModal').classList.add('active');
        }

        function closeTrophy() {
            document.getElementById('trophyModal').classList.remove('active');
        }

        switchRace('MVP');
    </script>
</body>
</html>
