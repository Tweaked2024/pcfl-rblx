<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AFL - Legacy Hall of Fame</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { background-color: #110c06; color: #f3eae0; -webkit-font-smoothing: antialiased; }
        
        /* Dark Configured Navigation Bar Component */
        header { background: #1c150d; border-bottom: 1px solid #2e2316; position: sticky; top: 0; z-index: 1000; }
        .nav-container { max-width: 1200px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; padding: 0.8rem 2rem; }
        .logo-area { font-weight: 900; font-size: 1.25rem; letter-spacing: -0.05em; text-transform: uppercase; color: #d4af37; text-decoration: none; }
        .main-nav { display: flex; gap: 1.75rem; }
        .nav-item { text-decoration: none; color: #a29381; font-size: 0.85rem; font-weight: 700; text-transform: lowercase; }
        .nav-item.active { color: #d4af37; }

        main { max-width: 1200px; margin: 2.5rem auto; padding: 0 2rem; }

        /* Gold Point Metric Badges Module Bar from image_7637e7.png */
        .metric-legend-container { background: #1c150d; border: 1px solid #42331f; border-radius: 8px; padding: 1rem 1.25rem; display: flex; gap: 0.6rem; flex-wrap: wrap; align-items: center; margin-bottom: 2.5rem; }
        .legend-lead { font-size: 0.75rem; font-weight: 900; color: #d4af37; text-transform: uppercase; letter-spacing: 0.04em; margin-right: 0.75rem; }
        .metric-chip { background: #2e2316; border: 1px solid #54432c; padding: 0.35rem 0.75rem; border-radius: 20px; font-size: 0.7rem; font-weight: 700; display: flex; align-items: center; gap: 0.35rem; color: #f3eae0; }
        .chip-score-gold { color: #f59e0b; background: rgba(245, 158, 11, 0.15); padding: 0.1rem 0.4rem; border-radius: 4px; font-weight: 800; }

        /* 3-Column Profile Podium Layout Structure */
        .podium-showcase-matrix { display: grid; grid-template-columns: 1fr 1.1fr 1fr; gap: 1.5rem; align-items: end; margin-bottom: 3.5rem; }
        .podium-box-card { background: linear-gradient(180deg, #261f16 0%, #1c150d 100%); border: 1px solid #42331f; border-radius: 12px; padding: 2.25rem 1.25rem; text-align: center; position: relative; box-shadow: 0 4px 20px rgba(0,0,0,0.2); }
        .podium-box-card.first-place-gold { border: 2px solid #d4af37; padding: 3.5rem 1.25rem; background: linear-gradient(180deg, #332717 0%, #1c150d 100%); }
        
        .placement-ribbon-tag { position: absolute; top: -11px; left: 50%; transform: translateX(-50%); background: #d4af37; color: #110c06; font-size: 0.7rem; font-weight: 900; padding: 0.2rem 0.75rem; border-radius: 20px; text-transform: uppercase; letter-spacing: 0.02em; }
        .podium-profile-avatar { width: 68px; height: 68px; border-radius: 50%; background: #42331f; margin: 0 auto 1.25rem; display: flex; align-items: center; justify-content: center; font-weight: 800; border: 2px solid #54432c; font-size: 1.1rem; color: #d4af37; }
        .podium-profile-username { font-weight: 800; font-size: 1.05rem; margin-bottom: 0.35rem; letter-spacing: -0.01em; }
        .podium-score-output { color: #d4af37; font-size: 1.4rem; font-weight: 900; letter-spacing: -0.02em; }

        /* Secondary Grid Row Tables Configuration */
        .dark-rows-ledger { background: #1c150d; border: 1px solid #42331f; border-radius: 8px; overflow: hidden; }
        .ledger-row-strip { display: flex; justify-content: space-between; align-items: center; padding: 1.1rem 1.5rem; border-bottom: 1px solid #2e2316; font-size: 0.9rem; }
        .ledger-row-strip:last-child { border-bottom: none; }
        .ledger-identity-side { display: flex; align-items: center; gap: 1.25rem; }
        .ledger-rank-idx { font-weight: 900; color: #a29381; width: 1rem; }
        .ledger-username-string { font-weight: 700; color: #f3eae0; }
        .ledger-score-bold { color: #d4af37; font-weight: 800; font-size: 0.95rem; }
    </style>
</head>
<body>

    <header>
        <div class="nav-container">
            <a href="index.html" class="logo-area">AFL LEGACY</a>
            <nav class="main-nav">
                <a href="index.html" class="nav-item">standings</a>
                <a href="teams.html" class="nav-item">teams</a>
                <a href="scores.html" class="nav-item">scores</a>
                <a href="stats.html" class="nav-item">stats</a>
                <a href="rulebook.html" class="nav-item">rulebook</a>
                <a href="legacy.html" class="nav-item active">legacy</a>
            </nav>
        </div>
    </header>

    <main>
        <div class="metric-legend-container">
            <span class="legend-lead">How XP is Scored</span>
            <div class="metric-chip">💍 Allegiance Bowl <span class="chip-score-gold">1,000</span></div>
            <div class="metric-chip">🏆 Conf. Title <span class="chip-score-gold">400</span></div>
            <div class="metric-chip">👑 MVP <span class="chip-score-gold">1,000</span></div>
        </div>

        <div class="podium-showcase-matrix">
            <div class="podium-box-card">
                <span class="placement-ribbon-tag">#2</span>
                <div class="podium-profile-avatar">CO</div>
                <div class="podium-profile-username">TheCoopDudeddd</div>
                <div class="podium-score-output">19,850 <span style="font-size:0.75rem; color:#a29381; font-weight:500;">XP</span></div>
            </div>
            
            <div class="podium-box-card first-place-gold">
                <span class="placement-ribbon-tag" style="background:#f59e0b; font-weight:900;">👑 #1</span>
                <div class="podium-profile-avatar" style="border-color:#d4af37; background:#54432c;">FI</div>
                <div class="podium-profile-username">FINLEY4K</div>
                <div class="podium-score-output">23,800 <span style="font-size:0.75rem; color:#a29381; font-weight:500;">XP</span></div>
            </div>

            <div class="podium-box-card">
                <span class="placement-ribbon-tag">#3</span>
                <div class="podium-profile-avatar">DI</div>
                <div class="podium-profile-username">xDiminq</div>
                <div class="podium-score-output">19,750 <span style="font-size:0.75rem; color:#a29381; font-weight:500;">XP</span></div>
            </div>
        </div>

        <div class="dark-rows-ledger">
            <div class="ledger-row-strip">
                <div class="ledger-identity-side">
                    <span class="ledger-rank-idx">4</span>
                    <span class="ledger-username-string">fakel1l</span>
                </div>
                <div class="ledger-score-bold">19,150 XP</div>
            </div>
            <div class="ledger-row-strip">
                <div class="ledger-identity-side">
                    <span class="ledger-rank-idx">5</span>
                    <span class="ledger-username-string">Sinnables</span>
                </div>
                <div class="ledger-score-bold">18,800 XP</div>
            </div>
        </div>
    </main>

</body>
</html>
