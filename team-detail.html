<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AFL - Team Roster Details</title>
    <style>
        :root { --primary-red: #e61e2b; --primary-dark: #11141a; --border-color: #e2e8f0; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background: #f8fafc; }
        header { background: white; border-bottom: 1px solid var(--border-color); padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-weight: bold; text-decoration: none; color: #000; }
        main { max-width: 1200px; margin: 2rem auto; padding: 0 2rem; }
        .back-link { display: inline-block; margin-bottom: 1rem; color: var(--primary-red); text-decoration: none; font-weight: bold; }
        .banner { background: #7f1d1d; color: white; padding: 2rem; border-radius: 12px; margin-bottom: 2rem; }
        .stats-box { background: white; border: 1px solid var(--border-color); border-radius: 8px; overflow: hidden; }
        .box-title { background: #7f1d1d; color: white; padding: 0.75rem 1rem; font-weight: bold; text-transform: uppercase; }
        .box-content { padding: 1rem; line-height: 1.6; }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="logo">★ American Football League</a>
        <a href="teams.html" style="text-decoration:none; color: #64748b; font-weight:600;">Back to Roster Directory</a>
    </header>

    <main>
        <a href="teams.html" class="back-link">⇠ Back to Teams Grid</a>
        <div class="banner">
            <h1 id="team-title">Franchise Profile</h1>
            <p>Official Team Hub & Active Rosters</p>
        </div>

        <div class="stats-box">
            <div class="box-title">Roster Snapshot Summary</div>
            <div class="box-content">
                <p><strong>Status:</strong> Active Verification Logs Confirmed.</p>
                <p>All core stats from ongoing games sync automatically to the live database tabs.</p>
            </div>
        </div>
    </main>

    <script>
        const params = new URLSearchParams(window.location.search);
        const teamCode = params.get('team') || 'Franchise';
        document.getElementById('team-title').innerText = "Team " + teamCode;
    </script>
</body>
</html>
