<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AFL - Team Directory</title>
    <style>
        :root { --primary-red: #e61e2b; --primary-dark: #11141a; --bg-light: #f8fafc; --bg-card: #ffffff; --border-color: #e2e8f0; --text-muted: #64748b; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background-color: var(--bg-light); }
        header { background: var(--bg-card); border-bottom: 1px solid var(--border-color); position: sticky; top: 0; z-index: 100; }
        .nav-container { max-width: 1400px; margin: 0 auto; display: flex; justify-content: space-between; padding: 1rem 2rem; align-items: center; }
        .logo { font-weight: 800; text-transform: uppercase; color: #000; text-decoration: none; }
        .main-nav { display: flex; gap: 1.5rem; }
        .nav-item { text-decoration: none; color: var(--text-muted); font-weight: 600; }
        .nav-item:hover, .nav-item.active { color: var(--primary-red); }

        main { max-width: 1400px; margin: 2rem auto; padding: 0 2rem; }
        h2 { margin-bottom: 1.5rem; text-transform: uppercase; }
        
        .teams-grid { display: grid; grid-template-columns: repeat(12, minmax(110px, 1fr)); gap: 1rem; overflow-x: auto; padding-bottom: 1rem; }
        .team-card { background: white; border: 1px solid var(--border-color); border-top: 4px solid var(--primary-red); border-radius: 8px; padding: 1.5rem 0.5rem; text-align: center; cursor: pointer; text-decoration: none; color: inherit; display: block; }
        .team-logo { width: 50px; height: 50px; background: #f1f5f9; border-radius: 50%; margin: 0 auto 1rem; display: flex; align-items: center; justify-content: center; font-weight: bold; color: var(--text-muted); }
        .team-name { font-weight: 700; font-size: 0.9rem; }
    </style>
</head>
<body>

    <header>
        <div class="nav-container">
            <a href="index.html" class="logo">★ American Football League</a>
            <nav class="main-nav">
                <a href="index.html" class="nav-item">Standings</a>
                <a href="teams.html" class="nav-item active">Teams</a>
                <a href="scores.html" class="nav-item">Scores</a>
                <a href="stats.html" class="nav-item">Stats</a>
                <a href="rulebook.html" class="nav-item">Rulebook</a>
                <a href="legacy.html" class="nav-item">Legacy</a>
            </nav>
        </div>
    </header>

    <main>
        <h2>League Franchise Directory (12 Main Grid Columns)</h2>
        <div class="teams-grid">
            <a href="team-detail.html?team=ARI" class="team-card"><div class="team-logo">ARI</div><div class="team-name">Cardinals</div></a>
            <a href="team-detail.html?team=ATL" class="team-card"><div class="team-logo">ATL</div><div class="team-name">Falcons</div></a>
            <a href="team-detail.html?team=BAL" class="team-card"><div class="team-logo">BAL</div><div class="team-name">Ravens</div></a>
            <a href="team-detail.html?team=BUF" class="team-card"><div class="team-logo">BUF</div><div class="team-name">Bills</div></a>
            <a href="team-detail.html?team=CAR" class="team-card"><div class="team-logo">CAR</div><div class="team-name">Panthers</div></a>
            <a href="team-detail.html?team=CHI" class="team-card"><div class="team-logo">CHI</div><div class="team-name">Bears</div></a>
            <a href="team-detail.html?team=CIN" class="team-card"><div class="team-logo">CIN</div><div class="team-name">Bengals</div></a>
            <a href="team-detail.html?team=CLE" class="team-card"><div class="team-logo">CLE</div><div class="team-name">Browns</div></a>
            <a href="team-detail.html?team=DAL" class="team-card"><div class="team-logo">DAL</div><div class="team-name">Cowboys</div></a>
            <a href="team-detail.html?team=DEN" class="team-card"><div class="team-logo">DEN</div><div class="team-name">Broncos</div></a>
            <a href="team-detail.html?team=DET" class="team-card"><div class="team-logo">DET</div><div class="team-name">Lions</div></a>
            <a href="team-detail.html?team=GB" class="team-card"><div class="team-logo">GB</div><div class="team-name">Packers</div></a>
        </div>
    </main>

</body>
</html>
