<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AFL - Live Award Race</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { background-color: #fcfcfc; color: #111827; }
        
        header { background: #ffffff; border-bottom: 1px solid #efefef; position: sticky; top: 0; z-index: 1000; }
        .nav-container { max-width: 1200px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; padding: 0.8rem 2rem; }
        .logo-area { font-weight: 900; font-size: 1.25rem; letter-spacing: -0.05em; text-transform: uppercase; color: #111827; text-decoration: none; }
        .main-nav { display: flex; gap: 1.75rem; }
        .nav-item { text-decoration: none; color: #4b5563; font-size: 0.85rem; font-weight: 700; text-transform: lowercase; }
        .nav-item.active { color: #e61e2b; }

        main { max-width: 1100px; margin: 2.5rem auto; padding: 0 2rem; }
        .doc-header-block h1 { font-size: 2.5rem; font-weight: 900; text-transform: uppercase; letter-spacing: -0.04em; color: #111827; margin-bottom: 0.2rem; }
        .doc-header-block p { font-size: 0.9rem; color: #6b7280; margin-bottom: 2rem; }

        /* Horizontal Selection Track Pill Row from image_763827.png */
        .pills-scroll-rail { display: flex; gap: 0.45rem; flex-wrap: wrap; margin-bottom: 2rem; border-bottom: 1px solid #e5e7eb; padding-bottom: 1.5rem; }
        .category-filter-pill { background: #ffffff; border: 1px solid #d1d5db; color: #374151; font-size: 0.75rem; font-weight: 700; padding: 0.45rem 1.1rem; border-radius: 20px; cursor: pointer; text-transform: uppercase; transition: all 0.1s; }
        .category-filter-pill:hover { background: #f9fafb; border-color: #9ca3af; }
        .category-filter-pill.pill-selected { background: #ca8a04; color: #ffffff; border-color: #ca8a04; }

        .section-headline-title { font-size: 1.35rem; font-weight: 900; text-transform: uppercase; margin-bottom: 1.5rem; letter-spacing: -0.02em; }

        /* Stacked Row Items Matrix Styles mapping individual logs components */
        .live-entrant-card { display: flex; justify-content: space-between; align-items: center; background: #ffffff; border: 1px solid #e5e7eb; border-radius: 8px; padding: 0.85rem 1.5rem; margin-bottom: 0.6rem; box-shadow: 0 1px 2px rgba(0,0,0,0.01); }
        .entrant-profile-block { display: flex; align-items: center; gap: 1.1rem; }
        .entrant-rank-index { font-size: 0.95rem; font-weight: 900; color: #6b7280; width: 1rem; }
        .entrant-avatar-circle { width: 34px; height: 34px; border-radius: 50%; background: #f3f4f6; border: 1px solid #e5e7eb; }
        .entrant-username-text { font-size: 0.9rem; font-weight: 700; color: #111827; letter-spacing: -0.01em; }
        
        .entrant-data-side { display: flex; align-items: center; gap: 2.25rem; }
        .entrant-metrics-string { color: #6b7280; font-weight: 600; font-size: 0.8rem; letter-spacing: 0.02em; }
        .entrant-rating-output { font-size: 1.15rem; font-weight: 900; color: #ca8a04; letter-spacing: -0.02em; width: 40px; text-align: right; }
    </style>
</head>
<body>

    <header>
        <div class="nav-container">
            <a href="index.html" class="logo-area">AFL ECOSYSTEM</a>
            <nav class="main-nav">
                <a href="index.html" class="nav-item">standings</a>
                <a href="teams.html" class="nav-item">teams</a>
                <a href="scores.html" class="nav-item">scores</a>
                <a href="stats.html" class="nav-item">stats</a>
                <a href="rulebook.html" class="nav-item">rulebook</a>
                <a href="legacy.html" class="nav-item active">legacy</a>
            </nav>
        </div>
    </header>

    <main>
        <div class="doc-header-block">
            <h1>Award Tracker</h1>
            <p>The race for the AFL's top honors, ranked live from league stats.</p>
        </div>

        <div class="pills-scroll-rail">
            <button class="category-filter-pill pill-selected">MVP</button>
            <button class="category-filter-pill">OPOTY</button>
            <button class="category-filter-pill">DPOTY</button>
            <button class="category-filter-pill">QBOTY</button>
            <button class="category-filter-pill">RBOTY</button>
            <button class="category-filter-pill">WROTY</button>
            <button class="category-filter-pill">TEOTY</button>
            <button class="category-filter-pill">COTY</button>
            <button class="category-filter-pill">DEOTY</button>
            <button class="category-filter-pill">DBOTY</button>
            <button class="category-filter-pill">LBOTY</button>
            <button class="category-filter-pill">KOTY</button>
        </div>

        <h3 class="section-headline-title">Most Valuable Player</h3>

        <div class="live-entrant-card">
            <div class="entrant-profile-block">
                <span class="entrant-rank-index">4</span>
                <div class="entrant-avatar-circle" style="background: #fbcfe8;"></div>
                <span class="entrant-username-text">HalfDunk</span>
            </div>
            <div class="entrant-data-side">
                <span class="entrant-metrics-string">1049 YDS | 76 REC | 12 TD</span>
                <span class="entrant-rating-output">88.0</span>
            </div>
        </div>

        <div class="live-entrant-card">
            <div class="entrant-profile-block">
                <span class="entrant-rank-index">5</span>
                <div class="entrant-avatar-circle" style="background: #fed7aa;"></div>
                <span class="entrant-username-text">jpingenza77</span>
            </div>
            <div class="entrant-data-side">
                <span class="entrant-metrics-string">790 YDS | 12 TD | 93 ATT</span>
                <span class="entrant-rating-output">85.9</span>
            </div>
        </div>
    </main>

</body>
</html>
