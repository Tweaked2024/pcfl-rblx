<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Site-Wide Live Score Bar</title>
    <style>
        /* Base page styling */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #1a1a1a;
            color: #fff;
        }

        /* Standard Header Placeholder */
        .primary-header {
            background-color: #111;
            padding: 20px;
            border-bottom: 1px solid #333;
            text-align: center;
        }

        .main-content {
            padding: 40px 20px;
            text-align: center;
            max-width: 800px;
            margin: 0 auto;
        }

        /* -------------------------------------------------------------------------
           LIVE TICKER BAR STYLES (Usually found in /nav.css)
           ------------------------------------------------------------------------- */
        .live-bar {
            background-color: #000;
            border-bottom: 2px solid #9146ff; /* Twitch theme highlight */
            font-size: 13px;
            font-weight: 700;
            text-transform: uppercase;
            overflow: hidden;
            width: 100%;
        }

        .live-bar-inner {
            display: flex;
            align-items: center;
            justify-content: space-between;
            max-width: 1200px;
            margin: 0 auto;
            padding: 8px 16px;
            gap: 20px;
        }

        /* Call-To-Action Button styling */
        .live-bar-cta {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #fff;
            text-decoration: none;
            white-space: nowrap;
            background: rgba(255,255,255,0.08);
            padding: 6px 12px;
            border-radius: 4px;
            transition: background 0.2s;
        }
        .live-bar-cta:hover {
            background: rgba(255,255,255,0.15);
        }

        /* Glowing Live Dot */
        .live-bar-dot {
            width: 8px;
            height: 8px;
            background-color: #ff3b30;
            border-radius: 50%;
            display: inline-block;
            box-shadow: 0 0 8px #ff3b30;
            animation: pulse 1.5s infinite ease-in-out;
        }

        .live-bar-watch {
            color: #9146ff;
        }

        /* Ticker Container */
        .live-bar-scores {
            display: flex;
            gap: 12px;
            overflow-x: auto;
            padding-bottom: 2px;
            flex-grow: 1;
        }

        /* Individual Game Box Score (The "Bug") */
        .live-bug {
            display: flex;
            align-items: center;
            background: #222;
            border: 1px solid #333;
            border-radius: 4px;
            text-decoration: none;
            color: #fff;
            overflow: hidden;
            min-width: 160px;
        }
        .live-bug:hover {
            border-color: #555;
        }

        .live-bug-teams {
            display: flex;
            flex-direction: column;
            flex-grow: 1;
            padding: 4px 8px;
            justify-content: center;
            border-right: 1px solid #333;
        }

        .live-bug-row {
            display: flex;
            align-items: center;
            gap: 6px;
            height: 20px;
            opacity: 0.6;
        }
        .live-bug-row.is-leading {
            opacity: 1; /* Highlight whoever is winning */
        }

        .live-bug-logo {
            width: 16px;
            height: 16px;
            object-fit: contain;
            background: #444; /* Fallback placeholder shape */
            border-radius: 2px;
        }

        .live-bug-abbr {
            font-family: monospace;
            width: 32px;
        }

        .live-bug-score {
            margin-left: auto;
            font-variant-numeric: tabular-nums;
        }

        /* Clock / Quarter Box */
        .live-bug-phase {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 0 8px;
            min-width: 45px;
            text-align: center;
            font-size: 10px;
            background: #181818;
            height: 100%;
        }

        .live-bug-clock {
            color: #aaa;
            font-size: 9px;
            margin-top: 2px;
        }

        @keyframes pulse {
            0% { opacity: 0.4; }
            50% { opacity: 1; }
            100% { opacity: 0.4; }
        }
    </style>
</head>
<body>

    <!-- Target Element: JavaScript looks for this to inject the live bar above it -->
    <header class="primary-header">
        <h2>🏈 Arena Football League</h2>
    </header>

    <main class="main-content">
        <h1>League Central</h1>
        <p>This is a live-updating site layout demonstration. If streams are active on the network server, the game score ticker will instantly anchor itself to the top of the browser view.</p>
    </main>

    <!-- The Score Injector Logic -->
    <script>
        (function () {
            if (document.getElementById('live-bar')) return;

            var TEAM = {
                cardinals: ['arz', 'ARZ'], falcons: ['atl', 'ATL'], ravens: ['bal', 'BAL'],
                bills: ['buf', 'BUF'], panthers: ['car', 'CAR'], bears: ['chi', 'CHI'],
                bengals: ['cin', 'CIN'], browns: ['cle', 'CLE'], cowboys: ['dal', 'DAL'],
                broncos: ['den', 'DEN'], lions: ['det', 'DET'], packers: ['gb', 'GB'],
                texans: ['hou', 'HOU'], colts: ['ind', 'IND'], jaguars: ['jax', 'JAX'],
                chiefs: ['kc', 'KC'], chargers: ['lac', 'LAC'], rams: ['lar', 'LAR'],
                raiders: ['lv', 'LV'], dolphins: ['mia', 'MIA'], vikings: ['min', 'MIN'],
                patriots: ['ne4', 'NE'], saints: ['no', 'NO'], giants: ['nyg', 'NYG'],
                jets: ['nyj', 'NYJ'], eagles: ['phi', 'PHI'], steelers: ['pit', 'PIT'],
                seahawks: ['sea', 'SEA'], '49ers': ['sf', 'SF'], niners: ['sf', 'SF'],
                buccaneers: ['tb', 'TB'], titans: ['ten', 'TEN'], commanders: ['was', 'WAS'],
                redskins: ['was', 'WAS'],
            };

            function teamInfo(name) {
                var words = String(name || '').toLowerCase().replace(/[^a-z0-9 ]/g, '').trim().split(/\s+/);
                for (var i = words.length - 1; i >= 0; i--) {
                    if (TEAM[words[i]]) return TEAM[words[i]];
                }
                return null;
            }

            function shortQuarter(q) {
                var s = String(q || '').toLowerCase();
                if (s.indexOf('ot') !== -1 || s.indexOf('overtime') !== -1) return 'OT';
                if (s.indexOf('half') !== -1) return 'HALF';
                if (s.indexOf('final') !== -1 || s.indexOf('end') === 0) return 'FINAL';
                var m = s.match(/([1-4])/);
                return m ? 'Q' + m[1] : String(q || '').toUpperCase().slice(0, 5);
            }

            /* ---- Build the bar structure dynamically ---- */
            var bar = document.createElement('div');
            bar.id = 'live-bar';
            bar.className = 'live-bar';
            bar.hidden = true;

            var inner = document.createElement('div');
            inner.className = 'container live-bar-inner';

            var cta = document.createElement('a');
            cta.className = 'live-bar-cta';
            cta.href = '/multiview/';
            var dot = document.createElement('span');
            dot.className = 'live-bar-dot';
            dot.setAttribute('aria-hidden', 'true');
            var ctaText = document.createElement('span');
            ctaText.textContent = 'AFL is live now';
            var ctaArrow = document.createElement('span');
            ctaArrow.className = 'live-bar-watch';
            ctaArrow.textContent = ' watch \u2192';
            cta.appendChild(dot);
            cta.appendChild(ctaText);
            cta.appendChild(ctaArrow);

            var bugs = document.createElement('div');
            bugs.className = 'live-bar-scores';
            bugs.id = 'live-bar-scores';

            inner.appendChild(cta);
            inner.appendChild(bugs);
            bar.appendChild(inner);

            function mount() {
                var header = document.querySelector('.primary-header');
                if (header && header.parentNode) {
                    header.parentNode.insertBefore(bar, header);
                } else {
                    document.body.insertBefore(bar, document.body.firstChild);
                }
            }
            mount();

            function teamRow(team, otherScore) {
                var row = document.createElement('div');
                row.className = 'live-bug-row' + (Number(team.score) > Number(otherScore) ? ' is-leading' : '');
                var info = teamInfo(team.name);
                var img = document.createElement('img');
                img.className = 'live-bug-logo';
                img.alt = '';
                // Points to a fallback transparent placeholder block since production assets aren't local
                img.src = info ? '/images/teampngs/' + info[0] + '.png' : 'data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7';
                var abbr = document.createElement('span');
                abbr.className = 'live-bug-abbr';
                abbr.textContent = info ? info[1] : String(team.name || '').slice(0, 3).toUpperCase();
                abbr.title = team.name;
                var score = document.createElement('span');
                score.className = 'live-bug-score';
                score.textContent = team.score;
                row.appendChild(img);
                row.appendChild(abbr);
                row.appendChild(score);
                return row;
            }

            var lastKey = '';
            function render(scores) {
                var found = scores.filter(function (s) {
                    return s.found && s.teams && s.teams.length === 2;
                });
                var anyLive = scores.length > 0;

                var key = JSON.stringify([anyLive, found.map(function (s) {
                    return [s.channel, s.teams[0].score, s.teams[1].score, s.quarter, s.clock];
                })]);
                if (key === lastKey) { bar.hidden = !anyLive; return; }
                lastKey = key;

                bugs.innerHTML = '';
                found.forEach(function (s) {
                    var bug = document.createElement('a');
                    bug.className = 'live-bug';
                    bug.href = '/multiview/';
                    bug.title = 'Watch ' + s.channel + ' on the multiview';

                    var teams = document.createElement('div');
                    teams.className = 'live-bug-teams';
                    teams.appendChild(teamRow(s.teams[0], s.teams[1].score));
                    teams.appendChild(teamRow(s.teams[1], s.teams[0].score));
                    bug.appendChild(teams);

                    if (s.quarter || s.clock) {
                        var phase = document.createElement('div');
                        phase.className = 'live-bug-phase';
                        var q = document.createElement('span');
                        q.textContent = shortQuarter(s.quarter);
                        phase.appendChild(q);
                        if (s.clock) {
                            var c = document.createElement('span');
                            c.className = 'live-bug-clock';
                            c.textContent = s.clock;
                            phase.appendChild(c);
                        }
                        bug.appendChild(phase);
                    }

                    bugs.appendChild(bug);
                });

                bar.hidden = !anyLive;
            }

            var timer = null;
            function schedule(ms) {
                clearTimeout(timer);
                timer = setTimeout(check, ms);
            }

            /* -------------------------------------------------------------------------
               MOCKING PRODUCTION API RESPONSE FOR LOCAL TESTING 
               ------------------------------------------------------------------------- */
            function check() {
                // In production, uncomment the native fetch lines below:
                /*
                fetch('/api/scores')
                  .then(function (r) { return r.json(); })
                  .then(function (d) { ... })
                */

                // Simulated API JSON Payload from /api/scores
                var mockData = {
                    ok: true,
                    scores: [
                        {
                            channel: "twitch_stream_1",
                            found: true,
                            quarter: "3rd Quarter",
                            clock: "04:15",
                            teams: [
                                { name: "Cowboys", score: 24 },
                                { name: "49ers", score: 28 }
                            ]
                        },
                        {
                            channel: "twitch_stream_2",
                            found: true,
                            quarter: "1st Quarter",
                            clock: "12:00",
                            teams: [
                                { name: "Chiefs", score: 7 },
                                { name: "Bengals", score: 3 }
                            ]
                        }
                    ]
                };

                var scores = mockData.scores || [];
                render(scores);
                schedule(scores.length ? 30 * 1000 : 90 * 1000);
            }

            check();
            document.addEventListener('visibilitychange', function () {
                if (!document.hidden) check();
            });
        })();
    </script>
</body>
</html>
